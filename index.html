<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Video Call Summons</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Trebuchet MS', Arial, sans-serif;
    background: linear-gradient(
        135deg,
        #ff6b6b,
        #ffd93d,
        #6bcBef,
        #a66cff
    );
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 35px;
    border-radius: 30px;
    width: 100%;
    max-width: 750px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
}

.badge {
    display: inline-block;
    background: #ff4d8d;
    color: white;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: bold;
    margin-bottom: 20px;
}

h1 {
    color: #7c3aed;
    margin-bottom: 15px;
    font-size: 2.4rem;
}

.status {
    color: #ff4d8d;
    font-weight: bold;
    line-height: 1.8;
    margin-bottom: 25px;
}

.main-text {
    font-size: 1.2rem;
    line-height: 1.6;
    color: #374151;
    margin-bottom: 30px;
}

.question {
    color: #7c3aed;
    font-size: 1.7rem;
    font-weight: bold;
    margin-bottom: 30px;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

button {
    border: none;
    border-radius: 15px;
    padding: 15px 28px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

#yesBtn {
    background: #22c55e;
    color: white;
}

#noBtn {
    background: #ff6b6b;
    color: white;
}

#message {
    margin-top: 25px;
    min-height: 35px;
    color: #7c3aed;
    font-weight: bold;
}

</style>
</head>
<body>

<div class="container">

    <div class="badge">✨ CONFIDENTIAL INVITATION ✨</div>

    <h1>📞 Saturday Video Call Summons 📞</h1>

    <div id="recipient" class="status"></div>

    <div class="main-text">
        After countless unread messages,
        failed plans,
        and several rounds of
        <i>"let's decide later"</i>...
        <br><br>
        we have finally arrived at this moment.
    </div>

    <div class="question">
        Will you join the video call on Saturday?
    </div>

    <div class="buttons">
        <button id="yesBtn" onclick="acceptInvite()">
            Wouldn't miss it 😎
        </button>

        <button id="noBtn" onclick="moveNoButton()">
            Maybe not 😒
        </button>
    </div>

    <div id="message"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Valued Member of the Gang";

document.getElementById("recipient").innerHTML = `
Recipient: <b>${name}</b><br>
Status: Friendship Integrity Check
`;

const responses = [
    "Hmm...",
    "Are you sure?",
    "The gang misses you 🥺",
    "It's literally one video call.",
    "Suspicious behaviour detected.",
    "We're taking this personally now.",
    "Last chance...",
    "No is slowly losing its privileges."
];

let count = 0;
let yesScale = 1;
let moved = false;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

function moveNoButton() {

    if (!moved) {
        noBtn.style.position = "fixed";
        moved = true;
    }

    if (count < responses.length) {
        message.innerText = responses[count];
    }

    count++;

    const maxX = window.innerWidth - 180;
    const maxY = window.innerHeight - 100;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    yesScale = Math.min(2, yesScale + 0.08);
    yesBtn.style.transform = `scale(${yesScale})`;

    if (count >= responses.length) {
        noBtn.style.display = "none";
    }
}

function acceptInvite() {

    document.body.innerHTML = `
    <div style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        text-align:center;
        background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcBef,#a66cff);
        color:white;
        padding:30px;
    ">

        <h1 style="font-size:3rem;">
            🎉 ATTENDANCE CONFIRMED 🎉
        </h1>

        <p style="font-size:1.3rem;font-weight:bold;">
            Recipient: ${name}
        </p>

        <p style="font-size:1.2rem;">
            Status: Accepted ✅
        </p>

        <h2>
            A legendary gathering is now one step closer.
        </h2>

        <p style="font-size:1.3rem;">
            See you on Saturday.
        </p>

        <p style="font-size:1.2rem;">
            Excuses will no longer be accepted. 😌
        </p>

        <div style="
            margin-top:20px;
            background:rgba(255,255,255,0.2);
            padding:15px 25px;
            border-radius:15px;
        ">
            Please send a screenshot of this page to the group chat as proof of attendance.
        </div>

    </div>
    `;
}

</script>

</body>
</html>
