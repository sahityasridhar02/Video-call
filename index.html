<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidential Invitation</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Trebuchet MS', Arial, sans-serif;
    background:linear-gradient(
        135deg,
        #ff9a9e 0%,
        #fad0c4 25%,
        #a18cd1 75%,
        #84fab0 100%
    );
    text-align:center;
    overflow:hidden;
    min-height:100vh;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:40px;
    background:white;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h1{
    color:#7c3aed;
    font-size:2.3rem;
    margin-bottom:10px;
}

.status{
    color:#ec4899;
    font-weight:bold;
    margin-bottom:30px;
    line-height:1.8;
}

.main-text{
    font-size:1.2rem;
    line-height:1.9;
    color:#374151;
}

.question{
    margin-top:35px;
    font-size:1.5rem;
    font-weight:bold;
    color:#7c3aed;
}

.buttons{
    margin-top:40px;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 28px;
    font-size:1rem;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

#yesBtn{
    background:#22c55e;
    color:white;
    margin-right:20px;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    background:#f97316;
    color:white;
    position:absolute;
}

#message{
    margin-top:35px;
    min-height:40px;
    color:#7c3aed;
    font-weight:bold;
    font-size:1.1rem;
}

.badge{
    display:inline-block;
    background:#ec4899;
    color:white;
    padding:8px 16px;
    border-radius:20px;
    margin-bottom:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="badge">✨ CONFIDENTIAL INVITATION ✨</div>

    <h1>The Gang Has An Important Question...</h1>

    <div id="recipient" class="status"></div>

    <div class="main-text">
        After countless unread messages,
        <br><br>

        multiple failed attempts at planning,
        <br><br>

        and several rounds of
        <i>"let's decide later"</i>...
        <br><br>

        we have finally arrived at this moment.
    </div>

    <div class="question">
        Will you join the video call on Saturday?
    </div>

    <div class="buttons">
        <button id="yesBtn" onclick="acceptInvite()">
            Wouldn't miss it 😎
        </button>

        <button id="noBtn" onclick="moveNoButton()">
            Maybe not 😒
        </button>
    </div>

    <div id="message"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Esteemed Member";

const statuses = [
    "Awaiting Response",
    "Critical Decision Pending",
    "Saturday Participation Assessment",
    "Friendship Integrity Check"
];

const randomStatus =
    statuses[Math.floor(Math.random() * statuses.length)];

document.getElementById("recipient").innerHTML = `
Recipient: <b>${name}</b><br>
Status: ${randomStatus}
`;

const responses = [
    "Hmm...",
    "Are you sure?",
    "The gang misses you 🥺",
    "It's literally one video call.",
    "We're taking this personally now.",
    "Remember when we spent hours talking nonsense instead of studying?",
    "Very suspicious behaviour.",
    "Your friendship attendance is falling.",
    "Last chance...",
    "No has been removed due to excessive negativity."
];

let count = 0;
let yesScale = 1;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

noBtn.style.left = "55%";
noBtn.style.top = "520px";

function moveNoButton(){

    if(count < responses.length){
        message.innerText = responses[count];
    }

    count++;

    const maxX = window.innerWidth - 160;
    const maxY = window.innerHeight - 120;

    noBtn.style.left =
        Math.random() * maxX + "px";

    noBtn.style.top =
        Math.random() * maxY + "px";

    const noScale =
        Math.max(0.20, 1 - count * 0.1);

    noBtn.style.transform =
        `scale(${noScale})`;

    yesScale += 0.15;

    yesBtn.style.transform =
        `scale(${yesScale})`;

    if(count >= responses.length){
        noBtn.style.display = "none";
    }
}

function acceptInvite(){

    document.body.innerHTML = `

    <div style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        text-align:center;
        padding:30px;
        font-family:'Trebuchet MS', Arial, sans-serif;
        background:linear-gradient(
            135deg,
            #84fab0,
            #8fd3f4,
            #a18cd1
        );
    ">

        <h1 style="
            color:white;
            font-size:3rem;
        ">
            🎉 ATTENDANCE CONFIRMED 🎉
        </h1>

        <p style="
            font-size:1.3rem;
            color:white;
            font-weight:bold;
        ">
            Recipient: ${name}
        </p>

        <p style="
            font-size:1.2rem;
            color:white;
            font-weight:bold;
        ">
            Status: Accepted ✅
        </p>

        <h2 style="
            color:white;
            max-width:700px;
            margin-top:20px;
        ">
            A legendary gathering is now one step closer.
        </h2>

        <p style="
            color:white;
            font-size:1.3rem;
        ">
            See you on Saturday.
        </p>

        <p style="
            color:white;
            font-size:1.2rem;
        ">
            Excuses will no longer be accepted. 😌
        </p>

        <hr style="
            width:300px;
            border:1px solid rgba(255,255,255,0.5);
            margin:25px;
        ">

        <p style="
            color:white;
            font-size:1.1rem;
        ">
            Please send a screenshot of this page to the group chat as proof of attendance.
        </p>

    </div>
    `;
}

</script>

</body>
</html>
